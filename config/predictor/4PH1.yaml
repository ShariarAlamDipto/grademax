# Predictor config — Edexcel IGCSE Physics (4PH1)
subject:
  code: "4PH1"
  name: "Physics"
  level: "International GCSE"
  processed_dir: "Physics Processed"   # under data/processed/

topics_source: "classification/physics_topics.yaml"

window: { start_year: 2015, end_year: 2026 }

# 9-1 spec (4PH1) first assessed 2019; earlier papers are the legacy 4PH0 spec.
spec_eras:
  - { name: "legacy", code: "4PH0", start_year: 2011, end_year: 2018, weight: 0.2 }
  - { name: "9-1",    code: "4PH1", start_year: 2019, end_year: 2026, weight: 1.0 }

session_weights: { autumn: 1.3, summer: 1.0, winter: 1.0 }
recency_half_life_years: 3.0

target: { session: "autumn", year: 2026, label: "October/November 2026" }

# Real paper shape (Pearson 4PH1): Paper 1 = 2h / 110 marks; Paper 2 = 1h15 / 70 marks.
papers:
  - { id: "1", name: "Paper 1", duration_min: 120, total_marks: 110, typical_questions: [9, 12] }
  - { id: "2", name: "Paper 2", duration_min: 75,  total_marks: 70,  typical_questions: [6, 9] }

include_retakes: true

llm:
  extract:  { provider: "groq",       model: "llama-3.3-70b-versatile" }
  generate: { provider: "openrouter", model: "anthropic/claude-sonnet-4" }
