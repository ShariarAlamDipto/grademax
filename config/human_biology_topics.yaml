# ── DIFFICULTY INDICATORS ──────────────────────────────────────────────────────
difficulty:
  easy:
    command_words: ["define", "state", "name", "identify", "label", "give", "list", "write down", "complete the table", "write the formula"]
    characteristics: ["single recall", "direct labelling", "simple identification"]
  medium:
    command_words: ["calculate", "explain", "describe", "compare", "suggest", "draw", "predict", "show that", "write an equation", "balance"]
    characteristics: ["multi-step", "application", "linking concepts"]
  hard:
    command_words: ["design an experiment", "evaluate", "discuss", "assess", "justify", "suggest why", "analyse", "deduce", "devise"]
    characteristics: ["experimental design", "evaluation", "synthesis", "unfamiliar context"]
