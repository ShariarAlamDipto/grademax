# ── DIFFICULTY INDICATORS ──────────────────────────────────────────────────────
difficulty:
  easy:
    command_words: ["define", "state", "name", "identify", "label", "give", "list", "complete the table", "write down"]
    characteristics: ["single recall", "direct labelling", "simple identification"]
  medium:
    command_words: ["calculate", "explain", "describe", "compare", "suggest", "draw", "predict", "write an equation"]
    characteristics: ["multi-step", "application", "linking concepts"]
  hard:
    command_words: ["design an experiment", "evaluate", "discuss", "assess", "justify", "suggest why", "analyse"]
    characteristics: ["experimental design", "evaluation", "synthesis", "unfamiliar context"]
