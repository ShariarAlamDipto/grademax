# ── DIFFICULTY INDICATORS ──────────────────────────────────────────────────────
difficulty:
  easy:
    command_words: ["define", "state", "name", "give", "label", "list", "identify", "write the formula", "complete the table"]
    characteristics: ["single recall", "direct substitution", "balance simple equation"]
  medium:
    command_words: ["calculate", "explain", "describe", "compare", "show", "predict", "suggest", "draw", "write an equation"]
    characteristics: ["multi-step calculation", "application", "interpretation of graph"]
  hard:
    command_words: ["design", "plan", "evaluate", "suggest why", "justify", "assess", "discuss", "deduce"]
    characteristics: ["synthesis", "evaluation", "unfamiliar context", "multi-concept"]
