<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="gtext" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8BA64A"/>
      <stop offset="100%" stop-color="#687E34"/>
    </linearGradient>
  </defs>
  <!-- Black rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle green border -->
  <rect x="4" y="4" width="504" height="504" rx="92" ry="92" fill="none" stroke="#687E34" stroke-width="6" opacity="0.35"/>
  <!-- Centered G -->
  <text x="256" y="320" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="800" font-size="300" fill="url(#gtext)">G</text>
  <!-- MAX text at the bottom -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="90" fill="#687E34" letter-spacing="18" opacity="0.9">MAX</text>
</svg>
